<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mandelbrot Potential Landscape — Interactive</title>
<style>
  :root{
    --bg:#0B0A0E; --panel:rgba(18,16,24,.85); --text:#E9E4D9; --muted:#9A91A8;
    --accent:#E8641E; --focus:#8D8FD6; --line:rgba(255,255,255,.10);
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  }
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font:13px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text)}
  #gl{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:grab;touch-action:none}
  #gl.dragging{cursor:grabbing}

  #panel{position:fixed;top:14px;right:14px;width:248px;max-height:calc(100% - 28px);
    overflow-y:auto;background:var(--panel);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:8px;padding:14px 16px 12px;user-select:none}
  #panel .eyebrow{font:600 9.5px/1 var(--mono);letter-spacing:.18em;color:var(--accent);
    text-transform:uppercase;margin:0 0 6px}
  #panel h1{font-size:15px;font-weight:650;line-height:1.25;margin:0 0 2px;text-wrap:balance}
  #panel .sub{color:var(--muted);margin:0 0 10px;font-size:11.5px}
  #panel section{border-top:1px solid var(--line);padding:9px 0 7px}
  #panel h2{font:600 9.5px/1 var(--mono);letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin:0 0 8px}
  .row{display:flex;align-items:center;gap:8px;margin:0 0 7px}
  .row label{flex:0 0 74px;color:var(--text)}
  .row input[type=range]{flex:1;min-width:0;accent-color:var(--accent)}
  .row output{flex:0 0 44px;text-align:right;font:11.5px var(--mono);
    font-variant-numeric:tabular-nums;color:var(--muted)}
  .chk{display:flex;align-items:center;gap:8px;margin:0 0 7px;cursor:pointer}
  .chk input{accent-color:var(--accent);margin:0}
  .row select{flex:1;background:#1D1A26;color:var(--text);border:1px solid var(--line);
    border-radius:5px;padding:3px 6px;font:12px var(--mono)}
  #reset{width:100%;margin-top:4px;padding:6px 0;background:transparent;color:var(--text);
    border:1px solid var(--line);border-radius:6px;cursor:pointer;font:inherit}
  #reset:hover{border-color:var(--accent);color:var(--accent)}
  input:focus-visible,select:focus-visible,button:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
  .hint{color:var(--muted);font-size:10.5px;margin:10px 0 0;line-height:1.6}

  #overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(8,7,11,.88);z-index:10}
  #overlay .card{text-align:center;color:var(--text)}
  #overlay .card b{font-weight:600}
  #overlay progress{display:block;width:220px;margin:12px auto 8px;accent-color:var(--accent)}
  #overlay .pct{font:12px var(--mono);color:var(--muted);font-variant-numeric:tabular-nums}
  #overlay.hidden{display:none}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important} }
</style>
</head>
<body>
<canvas id="gl"></canvas>

<aside id="panel" aria-label="Render controls">
  <p class="eyebrow">Function rendering · CPM/M</p>
  <h1>Mandelbrot potential landscape</h1>
  <p class="sub">after Peitgen &amp; Richter, 1985–86</p>

  <section>
    <h2>Scene</h2>
    <label class="chk"><input type="checkbox" id="sphereOn" checked> Moon sphere</label>
    <label class="chk"><input type="checkbox" id="shadowsOn" checked> Cast shadows</label>
    <label class="chk"><input type="checkbox" id="crtOn" checked> CRT scanlines</label>
  </section>

  <section>
    <h2>Light</h2>
    <div class="row"><label for="az">Azimuth</label>
      <input type="range" id="az" min="0" max="360" step="1" value="45"><output id="azV">45°</output></div>
    <div class="row"><label for="el">Elevation</label>
      <input type="range" id="el" min="3" max="85" step="1" value="21"><output id="elV">21°</output></div>
    <div class="row"><label for="sunI">Intensity</label>
      <input type="range" id="sunI" min="0.4" max="1.6" step="0.05" value="1.05"><output id="sunIV">1.05</output></div>
  </section>

  <section>
    <h2>Terrain</h2>
    <div class="row"><label for="beta">Cliffs</label>
      <input type="range" id="beta" min="2.5" max="8" step="0.1" value="4.8"><output id="betaV">4.8</output></div>
    <div class="row"><label for="grid">Grid</label>
      <select id="grid"><option value="1024" selected>1024 × 1024</option><option value="2048">2048 × 2048</option></select></div>
  </section>

  <button id="reset" type="button">Reset view</button>
  <p class="hint">drag — orbit &nbsp;·&nbsp; wheel / pinch — zoom<br>right-drag or shift-drag — pan</p>
</aside>

<div id="overlay">
  <div class="card"><b>Computing potential field…</b>
    <progress id="prog" max="1" value="0"></progress>
    <span class="pct" id="pct">0%</span>
  </div>
</div>

<script>
"use strict";
// ---------------- constants (match the validated PoC) ----------------------
const X0=-2.7, X1=1.5, Y0=-2.1, Y1=2.1;   // complex-plane window
const HSCALE=0.55;                        // terrain height, world units
const MAXITER=400, BAIL2=1e20;            // escape iteration
const SPH_X=-1.75, SPH_Y=0.08, SPH_R=0.22;
const FOV_TAN=Math.tan(28*Math.PI/180);   // vertical half-FOV

const params={ sphere:true, shadows:true, crt:true,
  az:45, el:21, sunI:1.05, beta:4.8, grid:1024 };

const DEFAULT_CAM={ yaw:-0.682, pitch:0.313, dist:3.577, tx:-0.90, ty:0.40, tz:0.30 };
const cam={...DEFAULT_CAM};

// ---------------- WebGL setup ----------------------------------------------
const canvas=document.getElementById('gl');
const overlay=document.getElementById('overlay');
const gl=canvas.getContext('webgl2',{antialias:false, alpha:false});
if(!gl){
  overlay.querySelector('.card').innerHTML='<b>WebGL2 is required</b><br>This browser/context does not support it.';
  throw new Error('no webgl2');
}

const VS=`#version 300 es
void main(){
  vec2 p=vec2(float((gl_VertexID<<1)&2), float(gl_VertexID&2));
  gl_Position=vec4(p*2.0-1.0, 0.0, 1.0);
}`;

const FS=`#version 300 es
precision highp float;
precision highp int;
uniform highp sampler2D uField;
uniform vec2 uRes;
uniform vec3 uCamPos, uFwd, uRight, uUp;
uniform float uTanHalf;
uniform vec3 uSunDir;
uniform float uSunI, uBeta;
uniform vec4 uSphere;
uniform bool uSphereOn, uShadows, uCrt;
out vec4 fragColor;

const vec2 GMIN=vec2(${X0.toFixed(2)}, ${Y0.toFixed(2)});
const vec2 GSIZE=vec2(${(X1-X0).toFixed(2)}, ${(Y1-Y0).toFixed(2)});
const float H=${HSCALE};
const vec3 AMB=vec3(0.22,0.20,0.30);
const vec3 SUNC=vec3(1.0,0.95,0.90);
const vec3 HORIZON=vec3(1.0,0.42,0.05);
const vec3 SPHCOL=vec3(0.46,0.47,0.78);
const float TMAX=12.0;

vec2 fieldAt(vec2 p){                 // manual bilinear: R=sqrt(phi), G=interior
  vec2 ts=vec2(textureSize(uField,0));
  vec2 f=(p-GMIN)/GSIZE*ts-0.5;
  vec2 fl=floor(f), fr=f-fl;
  ivec2 i0=clamp(ivec2(fl), ivec2(0), ivec2(ts)-ivec2(2));
  vec2 a=texelFetch(uField,i0,0).rg;
  vec2 b=texelFetch(uField,i0+ivec2(1,0),0).rg;
  vec2 c=texelFetch(uField,i0+ivec2(0,1),0).rg;
  vec2 d=texelFetch(uField,i0+ivec2(1,1),0).rg;
  return mix(mix(a,b,fr.x), mix(c,d,fr.x), fr.y);
}
float hAt(vec2 p){ return H*exp(-uBeta*fieldAt(p).x); }

float marchTerrain(vec3 ro, vec3 rd){
  float t=0.02, tPrev=0.02; bool hit=false;
  for(int i=0;i<800;i++){
    vec3 p=ro+rd*t;
    if(p.z<hAt(p.xy)){ hit=true; break; }
    if(t>TMAX) break;
    tPrev=t; t+=0.004*(1.0+t);
  }
  if(!hit) return -1.0;
  float lo=tPrev, hi=t;
  for(int i=0;i<10;i++){
    float mid=0.5*(lo+hi);
    if(ro.z+rd.z*mid < hAt(ro.xy+rd.xy*mid)) hi=mid; else lo=mid;
  }
  return 0.5*(lo+hi);
}

float shadowAt(vec3 p){
  float t=0.02;
  for(int i=0;i<200;i++){
    vec3 q=p+uSunDir*t;
    if(q.z>H*1.05) return 1.0;
    if(q.z<hAt(q.xy)) return 0.0;
    t+=0.010*(1.0+t);
  }
  return 1.0;
}

vec3 skyColor(vec3 rd){
  float k=clamp((rd.z+0.02)/0.24, 0.0, 1.0)*3.0;
  vec3 s1=vec3(0.55,0.10,0.02), s2=vec3(0.10,0.02,0.02), s3=vec3(0.01,0.01,0.015);
  if(k<1.0) return mix(HORIZON,s1,k);
  if(k<2.0) return mix(s1,s2,k-1.0);
  return mix(s2,s3,k-2.0);
}

void main(){
  vec2 sc=(gl_FragCoord.xy/uRes)*2.0-1.0;
  sc.x*=uRes.x/uRes.y;
  vec3 rd=normalize(uFwd + uTanHalf*(sc.x*uRight + sc.y*uUp));
  vec3 ro=uCamPos;

  float tT=marchTerrain(ro,rd);
  float tS=-1.0;
  if(uSphereOn){
    vec3 oc=ro-uSphere.xyz;
    float b=dot(rd,oc);
    float disc=b*b-(dot(oc,oc)-uSphere.w*uSphere.w);
    if(disc>0.0){ float tt=-b-sqrt(disc); if(tt>0.0) tS=tt; }
  }

  vec3 col;
  bool sphereFirst=(tS>0.0)&&(tT<0.0||tS<tT);
  if(sphereFirst){
    vec3 p=ro+rd*tS;
    vec3 n=normalize(p-uSphere.xyz);
    float dif=max(dot(n,uSunDir),0.0);
    float rim=pow(clamp(1.0+dot(n,rd),0.0,1.0),2.0);
    col=SPHCOL*(AMB*1.1+SUNC*(uSunI*0.9*dif))+vec3(rim*0.08);
    col=mix(col,HORIZON,1.0-exp(-0.008*tS*tS*tS));
  } else if(tT>0.0){
    vec3 p=ro+rd*tT;
    vec2 fv=fieldAt(p.xy);
    if(fv.y>0.5){
      col=vec3(0.015,0.012,0.02);            // the set itself: black lake
    } else {
      vec2 ts=vec2(textureSize(uField,0));
      float e=GSIZE.x/ts.x;
      float hx=hAt(p.xy+vec2(e,0.0))-hAt(p.xy-vec2(e,0.0));
      float hy=hAt(p.xy+vec2(0.0,e))-hAt(p.xy-vec2(0.0,e));
      vec3 n=normalize(vec3(-hx/(2.0*e), -hy/(2.0*e), 1.0));
      float dif=max(dot(n,uSunDir),0.0);
      float sh=1.0;
      if(uShadows&&dif>0.001) sh=shadowAt(p+n*0.004+uSunDir*0.01);
      col=vec3(0.93,0.93,0.96)*(AMB+SUNC*(uSunI*dif*sh));
    }
    col=mix(col,HORIZON,1.0-exp(-0.008*tT*tT*tT));  // fog == horizon color
  } else {
    col=skyColor(rd);
  }

  col=pow(clamp(col,0.0,1.0), vec3(1.0/1.6));
  if(uCrt&&(int(gl_FragCoord.y)%3==0)) col*=0.94;
  fragColor=vec4(col,1.0);
}`;

function compile(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    const log=gl.getShaderInfoLog(s);
    overlay.classList.remove('hidden');
    overlay.querySelector('.card').innerHTML='<b>Shader compile error</b><br><pre style="text-align:left;max-width:80vw;overflow:auto">'+log+'</pre>';
    throw new Error(log);
  }
  return s;
}
const prog=gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog,gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
const U={}; ['uField','uRes','uCamPos','uFwd','uRight','uUp','uTanHalf','uSunDir','uSunI',
  'uBeta','uSphere','uSphereOn','uShadows','uCrt'].forEach(n=>U[n]=gl.getUniformLocation(prog,n));

// ---------------- potential field (chunked, keeps UI alive) ----------------
let fieldData=null, fieldN=0, fieldTex=null;

function computeField(N, done){
  overlay.classList.remove('hidden');
  overlay.querySelector('b').textContent='Computing potential field… '+N+' × '+N;
  const data=new Float32Array(N*N*2);
  let j=0;
  const progEl=document.getElementById('prog'), pctEl=document.getElementById('pct');
  function chunk(){
    const jEnd=Math.min(N, j+16);
    for(; j<jEnd; j++){
      const ci=Y0+(Y1-Y0)*j/(N-1);
      for(let i=0;i<N;i++){
        const cr=X0+(X1-X0)*i/(N-1);
        let zr=0, zi=0, n=0, r2=0;
        while(n<MAXITER){
          const t=zr*zr-zi*zi+cr; zi=2*zr*zi+ci; zr=t; n++;
          r2=zr*zr+zi*zi;
          if(r2>BAIL2) break;
        }
        const k=(j*N+i)*2;
        if(r2>BAIL2){
          const phi=0.5*Math.log(r2)/Math.pow(2,n);
          data[k]=Math.sqrt(Math.max(phi,0)); data[k+1]=0;
        } else { data[k]=0; data[k+1]=1; }
      }
    }
    progEl.value=j/N; pctEl.textContent=Math.round(100*j/N)+'%';
    if(j<N) setTimeout(chunk,0);
    else{
      fieldData=data; fieldN=N;
      if(!fieldTex) fieldTex=gl.createTexture();
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D,fieldTex);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.NEAREST);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.NEAREST);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
      gl.pixelStorei(gl.UNPACK_ALIGNMENT,1);
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RG32F,N,N,0,gl.RG,gl.FLOAT,data);
      overlay.classList.add('hidden');
      done();
    }
  }
  setTimeout(chunk,0);
}

// CPU-side samplers (camera collision + sphere rest height)
function gAt(x,y){
  const N=fieldN;
  let u=(x-X0)/(X1-X0)*(N-1), v=(y-Y0)/(Y1-Y0)*(N-1);
  u=Math.min(Math.max(u,0),N-1.001); v=Math.min(Math.max(v,0),N-1.001);
  const i=u|0, jj=v|0, fu=u-i, fv=v-jj;
  const g=(a,b)=>fieldData[(a*N+b)*2];
  return (g(jj,i)*(1-fu)+g(jj,i+1)*fu)*(1-fv)+(g(jj+1,i)*(1-fu)+g(jj+1,i+1)*fu)*fv;
}
function hAtJS(x,y){ return HSCALE*Math.exp(-params.beta*gAt(x,y)); }
function sphereZ(){ return hAtJS(SPH_X,SPH_Y)+SPH_R*0.75; }

// ---------------- camera ----------------------------------------------------
function camVectors(){
  const cp=Math.cos(cam.pitch), sp=Math.sin(cam.pitch);
  const cy=Math.cos(cam.yaw),   sy=Math.sin(cam.yaw);
  let px=cam.tx+cam.dist*cp*cy, py=cam.ty+cam.dist*cp*sy, pz=cam.tz+cam.dist*sp;
  if(fieldData) pz=Math.max(pz, hAtJS(px,py)+0.04);
  const f=[cam.tx-px, cam.ty-py, cam.tz-pz];
  const fl=Math.hypot(f[0],f[1],f[2]); f[0]/=fl; f[1]/=fl; f[2]/=fl;
  const r=[f[1],-f[0],0];
  const rl=Math.hypot(r[0],r[1])||1; r[0]/=rl; r[1]/=rl;
  const u=[r[1]*f[2], -r[0]*f[2], r[0]*f[1]-r[1]*f[0]];
  return {pos:[px,py,pz], fwd:f, right:r, up:u};
}

// ---------------- render loop (draw only when dirty) ------------------------
let dirty=true;
function draw(){
  const dpr=Math.min(window.devicePixelRatio||1, 1.5);
  const w=Math.round(canvas.clientWidth*dpr), h=Math.round(canvas.clientHeight*dpr);
  if(canvas.width!==w||canvas.height!==h){ canvas.width=w; canvas.height=h; }
  gl.viewport(0,0,w,h);

  const v=camVectors();
  const azr=params.az*Math.PI/180, elr=params.el*Math.PI/180;
  const sun=[Math.cos(elr)*Math.cos(azr), Math.cos(elr)*Math.sin(azr), Math.sin(elr)];

  gl.uniform1i(U.uField,0);
  gl.uniform2f(U.uRes,w,h);
  gl.uniform3fv(U.uCamPos,v.pos);
  gl.uniform3fv(U.uFwd,v.fwd);
  gl.uniform3fv(U.uRight,v.right);
  gl.uniform3fv(U.uUp,v.up);
  gl.uniform1f(U.uTanHalf,FOV_TAN);
  gl.uniform3fv(U.uSunDir,sun);
  gl.uniform1f(U.uSunI,params.sunI);
  gl.uniform1f(U.uBeta,params.beta);
  gl.uniform4f(U.uSphere,SPH_X,SPH_Y,sphereZ(),SPH_R);
  gl.uniform1i(U.uSphereOn,params.sphere?1:0);
  gl.uniform1i(U.uShadows,params.shadows?1:0);
  gl.uniform1i(U.uCrt,params.crt?1:0);
  gl.drawArrays(gl.TRIANGLES,0,3);
}
function frame(){ if(dirty&&fieldData){ draw(); dirty=false; } requestAnimationFrame(frame); }
requestAnimationFrame(frame);
window.addEventListener('resize',()=>{dirty=true;});

// ---------------- interaction: orbit / zoom / pan ---------------------------
const pointers=new Map();
let panMode=false;
canvas.addEventListener('contextmenu',e=>e.preventDefault());
canvas.addEventListener('pointerdown',e=>{
  try{ canvas.setPointerCapture(e.pointerId); }catch(_){}
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  panMode=(e.button===2)||e.shiftKey;
  canvas.classList.add('dragging');
});
canvas.addEventListener('pointerup',e=>{
  pointers.delete(e.pointerId);
  if(pointers.size===0) canvas.classList.remove('dragging');
});
canvas.addEventListener('pointercancel',e=>{pointers.delete(e.pointerId);});
canvas.addEventListener('pointermove',e=>{
  if(!pointers.has(e.pointerId)) return;
  const prev=pointers.get(e.pointerId);
  const dx=e.clientX-prev.x, dy=e.clientY-prev.y;

  if(pointers.size===2){                       // pinch zoom
    const ids=[...pointers.keys()];
    const other=pointers.get(ids[0]===e.pointerId?ids[1]:ids[0]);
    const d0=Math.hypot(prev.x-other.x, prev.y-other.y);
    pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
    const d1=Math.hypot(e.clientX-other.x, e.clientY-other.y);
    if(d0>0&&d1>0){ cam.dist=clamp(cam.dist*d0/d1,0.35,9); dirty=true; }
    return;
  }
  pointers.set(e.pointerId,{x:e.clientX,y:e.clientY});

  if(panMode){
    const v=camVectors(), k=cam.dist*0.0011;
    const ff=[v.fwd[0],v.fwd[1]];
    const fl=Math.hypot(ff[0],ff[1])||1; ff[0]/=fl; ff[1]/=fl;
    cam.tx+= -v.right[0]*dx*k + ff[0]*dy*k;
    cam.ty+= -v.right[1]*dx*k + ff[1]*dy*k;
    cam.tx=clamp(cam.tx,X0,X1); cam.ty=clamp(cam.ty,Y0,Y1);
  }else{
    cam.yaw  -= dx*0.005;
    cam.pitch = clamp(cam.pitch+dy*0.005, 0.05, 1.45);
  }
  dirty=true;
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  cam.dist=clamp(cam.dist*Math.exp(e.deltaY*0.0012),0.35,9);
  dirty=true;
},{passive:false});
function clamp(x,a,b){ return Math.min(Math.max(x,a),b); }

// ---------------- controls ---------------------------------------------------
function bindCheck(id,key){
  const el=document.getElementById(id);
  el.addEventListener('change',()=>{ params[key]=el.checked; dirty=true; });
}
bindCheck('sphereOn','sphere'); bindCheck('shadowsOn','shadows'); bindCheck('crtOn','crt');

function bindRange(id,key,fmt){
  const el=document.getElementById(id), out=document.getElementById(id+'V');
  el.addEventListener('input',()=>{ params[key]=parseFloat(el.value); out.textContent=fmt(el.value); dirty=true; });
}
bindRange('az','az',v=>v+'°');
bindRange('el','el',v=>v+'°');
bindRange('sunI','sunI',v=>parseFloat(v).toFixed(2));
bindRange('beta','beta',v=>parseFloat(v).toFixed(1));

document.getElementById('grid').addEventListener('change',e=>{
  params.grid=parseInt(e.target.value,10);
  computeField(params.grid,()=>{ dirty=true; });
});
document.getElementById('reset').addEventListener('click',()=>{
  Object.assign(cam,DEFAULT_CAM); dirty=true;
});

// ---------------- go ---------------------------------------------------------
computeField(params.grid,()=>{ dirty=true; });
</script>
</body>
</html>
